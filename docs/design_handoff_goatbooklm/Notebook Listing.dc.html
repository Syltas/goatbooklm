<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  body { font-family: 'Figtree', system-ui, sans-serif; color: #1f1f1f; -webkit-font-smoothing: antialiased; }
  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }
  input { font-family: inherit; }
  button { font-family: inherit; }
  input[type="search"]::-webkit-search-cancel-button { -webkit-appearance: none; }
</style>
</helmet>
<div data-screen-label="Notebook Listing" style="display: flex; flex-direction: column; height: 100dvh; background: #ffffff; color: #1f1f1f;">
  <header style="display: flex; flex-shrink: 0; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8e8ea; padding: 12px 24px;">
    <a href="#" style="font-weight: 600; letter-spacing: -0.025em; font-size: 16px; color: #1f1f1f; text-decoration: none;">GoatbookLM</a>
    <div style="display: flex; align-items: center; gap: 12px;">
      <span style="font-size: 14px; color: #5f6368;">andreas@univents.app</span>
      <button style="display: inline-flex; align-items: center; justify-content: center; height: 28px; padding: 0 10px; font-size: 12.8px; font-weight: 500; color: #1f1f1f; background: #ffffff; border: 1px solid #e8e8ea; border-radius: 6.4px; cursor: pointer;" style-hover="background: #f6f6f7;">Abmelden</button>
    </div>
  </header>
  <main style="min-height: 0; flex: 1; overflow-y: auto;">
    <div style="max-width: 1152px; margin: 0 auto; padding: 32px 24px;">
      <div style="display: flex; flex-wrap: wrap; align-items: center; justify-content: flex-end; gap: 12px;">
        <div style="position: relative;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5f6368" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; top: 50%; left: 10px; transform: translateY(-50%); pointer-events: none;"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
          <input type="search" placeholder="Notizbücher durchsuchen" value="{{ query }}" onChange="{{ onQueryChange }}" style="height: 32px; width: 224px; box-sizing: border-box; padding: 4px 10px 4px 32px; font-size: 14px; color: #1f1f1f; background: transparent; border: 1px solid #e8e8ea; border-radius: 8px; outline: none;" style-focus="border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.5);">
        </div>
        <div style="display: flex; align-items: center; gap: 2px; border: 1px solid #e8e8ea; border-radius: 8px; padding: 2px;">
          <button onClick="{{ setGridView }}" aria-label="Rasteransicht" style="display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border: none; border-radius: 6.4px; background: {{ gridBtnBg }}; color: #1f1f1f; cursor: pointer;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="14" rx="1"></rect><rect width="7" height="7" x="3" y="14" rx="1"></rect></svg>
          </button>
          <button onClick="{{ setListView }}" aria-label="Listenansicht" style="display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border: none; border-radius: 6.4px; background: {{ listBtnBg }}; color: #1f1f1f; cursor: pointer;" style-hover="background: #f6f6f7;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h.01"></path><path d="M3 18h.01"></path><path d="M3 6h.01"></path><path d="M8 12h13"></path><path d="M8 18h13"></path><path d="M8 6h13"></path></svg>
          </button>
        </div>
        <button style="display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 32px; padding: 0 10px 0 8px; font-size: 14px; font-weight: 500; color: #ffffff; background: #1f1f1f; border: none; border-radius: 9999px; cursor: pointer;" style-hover="background: rgba(31,31,31,0.8);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
          Neu erstellen
        </button>
      </div>
      <h2 style="margin: 24px 0 16px; font-size: 20px; font-weight: 500; color: #1f1f1f;">Zuletzt verwendet</h2>
      <sc-if value="{{ isGrid }}" hint-placeholder-val="{{ true }}">
        <div style="display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px;">
          <button style="display: flex; min-height: 220px; flex-direction: column; align-items: center; justify-content: center; gap: 12px; border-radius: 14.4px; border: 2px dashed #e8e8ea; background: transparent; color: #5f6368; cursor: pointer; transition: color .15s, border-color .15s;" style-hover="border-color: rgba(31,31,31,0.3); color: #1f1f1f;">
            <span style="display: flex; width: 44px; height: 44px; align-items: center; justify-content: center; border-radius: 9999px; background: #f6f6f7;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
            </span>
            <span style="font-size: 14px; font-weight: 500;">Neues Notizbuch erstellen</span>
          </button>
          <sc-for list="{{ filtered }}" as="nb" hint-placeholder-count="5">
            <div style="position: relative; isolation: isolate; display: flex; min-height: 220px; flex-direction: column; justify-content: space-between; overflow: hidden; border-radius: 14.4px; padding: 16px; background-color: {{ nb.color }}; box-sizing: border-box; cursor: pointer;">
              <div style="display: flex; align-items: flex-start; justify-content: space-between;">
                <span aria-hidden="true" style="font-size: 30px; line-height: 36px;">📓</span>
                <button aria-label="Optionen" style="display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border: none; border-radius: 6.4px; background: transparent; color: rgba(31,31,31,0.6); cursor: pointer;" style-hover="background: rgba(0,0,0,0.05); color: #1f1f1f;">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                </button>
              </div>
              <div style="margin-top: 40px; display: flex; flex-direction: column; gap: 4px;">
                <h3 style="margin: 0; font-size: 16px; font-weight: 500; color: #1f1f1f; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">{{ nb.title }}</h3>
                <p style="margin: 0; font-size: 14px; color: rgba(31,31,31,0.7); display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;">{{ nb.date }} · {{ nb.description }}</p>
              </div>
            </div>
          </sc-for>
        </div>
      </sc-if>
      <sc-if value="{{ isList }}" hint-placeholder-val="{{ false }}">
        <div style="display: flex; flex-direction: column; border: 1px solid #e8e8ea; border-radius: 11.2px; overflow: hidden;">
          <button style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; text-align: left; color: #5f6368; background: transparent; border: none; border-bottom: 1px solid #e8e8ea; cursor: pointer;" style-hover="background: rgba(246,246,247,0.5); color: #1f1f1f;">
            <span style="display: flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 9999px; background: #f6f6f7;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
            </span>
            <span style="font-size: 14px; font-weight: 500;">Neues Notizbuch erstellen</span>
          </button>
          <sc-for list="{{ filtered }}" as="nb" hint-placeholder-count="5">
            <div style="position: relative; display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #e8e8ea; cursor: pointer;" style-hover="background: rgba(246,246,247,0.5);">
              <span aria-hidden="true" style="font-size: 20px;">📓</span>
              <div style="min-width: 0; flex: 1;">
                <p style="margin: 0; font-size: 14px; font-weight: 500; color: #1f1f1f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ nb.title }}</p>
                <p style="margin: 0; font-size: 12px; color: #5f6368; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ nb.date }} · {{ nb.description }}</p>
              </div>
              <button aria-label="Optionen" style="display: inline-flex; flex-shrink: 0; align-items: center; justify-content: center; width: 28px; height: 28px; border: none; border-radius: 6.4px; background: transparent; color: #1f1f1f; cursor: pointer;" style-hover="background: #f6f6f7;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
              </button>
            </div>
          </sc-for>
        </div>
      </sc-if>
      <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
        <p style="margin: 24px 0 0; font-size: 14px; color: #5f6368;">Keine Notizbücher gefunden.</p>
      </sc-if>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { view: "grid", query: "" };
  notebooks = [
    { title: "Masterarbeit: Urbane Mobilität", date: "18. Juli 2026", description: "Literatur & Interviews", color: "#e8eaf6" },
    { title: "Vereinsrecht & Satzung", date: "12. Juli 2026", description: "Keine Beschreibung", color: "#e6f4ea" },
    { title: "Produktrecherche Q3", date: "5. Juli 2026", description: "Wettbewerber, Pricing, Studien", color: "#fef7e0" },
    { title: "Podcast-Notizen", date: "28. Juni 2026", description: "Transkripte Folge 12–18", color: "#fce8e6" },
    { title: "Steuererklärung 2025", date: "14. Juni 2026", description: "Belege & Merkblätter", color: "#f3e8fd" },
  ];
  renderVals() {
    const q = this.state.query.trim().toLowerCase();
    const filtered = q ? this.notebooks.filter(n => n.title.toLowerCase().includes(q)) : this.notebooks;
    return {
      query: this.state.query,
      onQueryChange: (e) => this.setState({ query: e.target.value }),
      isGrid: this.state.view === "grid",
      isList: this.state.view === "list",
      gridBtnBg: this.state.view === "grid" ? "#f6f6f7" : "transparent",
      listBtnBg: this.state.view === "list" ? "#f6f6f7" : "transparent",
      setGridView: () => this.setState({ view: "grid" }),
      setListView: () => this.setState({ view: "list" }),
      filtered,
      noResults: filtered.length === 0,
    };
  }
}
</script>
</body>
</html>
