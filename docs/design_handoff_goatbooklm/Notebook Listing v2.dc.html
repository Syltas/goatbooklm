<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f6f5f1; }
  body { font-family: 'Nunito Sans', system-ui, sans-serif; color: #23211e; -webkit-font-smoothing: antialiased; }
  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }
  input, button { font-family: inherit; }
  ::placeholder { color: #a8a29b; }
  input[type="search"]::-webkit-search-cancel-button { -webkit-appearance: none; }
</style>
</helmet>
<div data-screen-label="Notebook Listing v2" style="display: flex; flex-direction: column; min-height: 100dvh; background: #f6f5f1; color: #23211e;">
  <header style="display: flex; flex-shrink: 0; align-items: center; justify-content: space-between; padding: 12px 20px;">
    <a href="#" style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: #23211e;">
      <svg width="30" height="30" viewBox="0 0 48 48" aria-hidden="true"><rect x="2" y="2" width="44" height="44" rx="14" fill="#23211e"></rect><path d="M16 15 C13.5 10.5 16 5.5 21 6.5" fill="none" stroke="#f6f5f1" stroke-width="3" stroke-linecap="round"></path><path d="M32 15 C34.5 10.5 32 5.5 27 6.5" fill="none" stroke="#f6f5f1" stroke-width="3" stroke-linecap="round"></path><path d="M24 18.5 C20.5 15.5 15 15.5 12 17.5 V33 C15 31 20.5 31 24 34 C27.5 31 33 31 36 33 V17.5 C33 15.5 27.5 15.5 24 18.5 Z" fill="#f6f5f1"></path><path d="M24 19 V33.5" stroke="#23211e" stroke-width="2" stroke-linecap="round"></path></svg>
      <span style="font-family: 'Baloo 2', sans-serif; font-weight: 600; font-size: 18px; letter-spacing: -0.01em;">GoatbookLM</span>
    </a>
    <div style="display: flex; align-items: center; gap: 10px;">
      <span style="font-size: 13.5px; color: #78736b;">andreas@univents.app</span>
      <button style="display: inline-flex; align-items: center; justify-content: center; height: 32px; padding: 0 14px; font-size: 13px; font-weight: 700; color: #23211e; background: #ffffff; border: 1px solid #e7e4de; border-radius: 9999px; cursor: pointer;" style-hover="background: #efede8;">Abmelden</button>
    </div>
  </header>
  <main style="flex: 1;">
    <div style="max-width: 1152px; margin: 0 auto; padding: 40px 24px 56px; box-sizing: border-box;">
      <h1 style="margin: 0 0 28px; font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 34px; letter-spacing: -0.015em;">Willkommen zurück 👋</h1>
      <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 12px;">
        <button onClick="{{ noop }}" style="display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 40px; padding: 0 20px 0 16px; font-size: 14.5px; font-weight: 700; color: #ffffff; background: #23211e; border: none; border-radius: 9999px; cursor: pointer;" style-hover="background: #3c3934;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
          Neu erstellen
        </button>
        <div style="position: relative; margin-left: auto;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#78736b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; top: 50%; left: 14px; transform: translateY(-50%); pointer-events: none;"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
          <input type="search" placeholder="Notizbücher durchsuchen" value="{{ query }}" onChange="{{ onQueryChange }}" style="height: 40px; width: 260px; box-sizing: border-box; padding: 4px 16px 4px 38px; font-size: 14px; color: #23211e; background: #ffffff; border: 1px solid #e7e4de; border-radius: 9999px; outline: none; transition: border-color .15s;" style-focus="border-color: #2563eb;">
        </div>
        <div style="display: flex; align-items: center; gap: 2px; background: #ffffff; border: 1px solid #e7e4de; border-radius: 9999px; padding: 3px;">
          <button onClick="{{ setGridView }}" aria-label="Rasteransicht" style="display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border: none; border-radius: 9999px; background: {{ gridBtnBg }}; color: #23211e; cursor: pointer;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="14" rx="1"></rect><rect width="7" height="7" x="3" y="14" rx="1"></rect></svg>
          </button>
          <button onClick="{{ setListView }}" aria-label="Listenansicht" style="display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border: none; border-radius: 9999px; background: {{ listBtnBg }}; color: #23211e; cursor: pointer;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h.01"></path><path d="M3 18h.01"></path><path d="M3 6h.01"></path><path d="M8 12h13"></path><path d="M8 18h13"></path><path d="M8 6h13"></path></svg>
          </button>
        </div>
      </div>
      <h2 style="margin: 36px 0 16px; font-size: 15px; font-weight: 700; color: #78736b; text-transform: uppercase; letter-spacing: 0.06em;">Zuletzt verwendet</h2>
      <sc-if value="{{ isGrid }}" hint-placeholder-val="{{ true }}">
        <div style="display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px;">
          <button style="display: flex; min-height: 216px; flex-direction: column; align-items: center; justify-content: center; gap: 12px; border-radius: 20px; border: 1.5px dashed #d9d5cd; background: transparent; color: #78736b; cursor: pointer; transition: color .15s, border-color .15s, background .15s;" style-hover="border-color: #23211e; color: #23211e; background: rgba(255,255,255,0.6);">
            <span style="display: flex; width: 44px; height: 44px; align-items: center; justify-content: center; border-radius: 9999px; background: #ffffff; border: 1px solid #e7e4de;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
            </span>
            <span style="font-size: 14px; font-weight: 700;">Neues Notizbuch</span>
          </button>
          <sc-for list="{{ filtered }}" as="nb" hint-placeholder-count="5">
            <div style="position: relative; isolation: isolate; display: flex; min-height: 216px; flex-direction: column; justify-content: space-between; overflow: hidden; border-radius: 20px; padding: 18px; background: #ffffff; box-sizing: border-box; cursor: pointer; border: 1px solid #eceae4; transition: box-shadow .15s, transform .15s;" style-hover="box-shadow: 0 12px 28px -14px rgba(35,33,30,0.28); transform: translateY(-2px);">
              <div style="display: flex; align-items: flex-start; justify-content: space-between;">
                <span aria-hidden="true" style="display: inline-flex; width: 46px; height: 46px; align-items: center; justify-content: center; border-radius: 14px; background: {{ nb.color }}; font-size: 22px;">{{ nb.emoji }}</span>
                <button aria-label="Optionen" style="display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border: none; border-radius: 9999px; background: transparent; color: #a8a29b; cursor: pointer;" style-hover="background: #f1efe9; color: #23211e;">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                </button>
              </div>
              <div style="display: flex; flex-direction: column; gap: 6px;">
                <h3 style="margin: 0; font-size: 17px; font-weight: 700; line-height: 1.4; letter-spacing: -0.005em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">{{ nb.title }}</h3>
                <p style="margin: 0; font-size: 13px; color: #78736b; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;">{{ nb.date }} · {{ nb.sources }}</p>
              </div>
            </div>
          </sc-for>
        </div>
      </sc-if>
      <sc-if value="{{ isList }}" hint-placeholder-val="{{ false }}">
        <div style="display: flex; flex-direction: column; background: #ffffff; border: 1px solid #eceae4; border-radius: 20px; overflow: hidden; padding: 6px;">
          <button style="display: flex; align-items: center; gap: 14px; padding: 12px 14px; text-align: left; color: #78736b; background: transparent; border: none; border-radius: 14px; cursor: pointer;" style-hover="background: #f6f5f1; color: #23211e;">
            <span style="display: flex; width: 38px; height: 38px; flex-shrink: 0; align-items: center; justify-content: center; border-radius: 9999px; border: 1px dashed #d9d5cd;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
            </span>
            <span style="font-size: 14px; font-weight: 700;">Neues Notizbuch erstellen</span>
          </button>
          <sc-for list="{{ filtered }}" as="nb" hint-placeholder-count="5">
            <div style="position: relative; display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: 14px; cursor: pointer;" style-hover="background: #f6f5f1;">
              <span aria-hidden="true" style="display: inline-flex; width: 38px; height: 38px; flex-shrink: 0; align-items: center; justify-content: center; border-radius: 12px; background: {{ nb.color }}; font-size: 18px;">{{ nb.emoji }}</span>
              <div style="min-width: 0; flex: 1;">
                <p style="margin: 0; font-size: 14.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ nb.title }}</p>
                <p style="margin: 1px 0 0; font-size: 12.5px; color: #78736b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ nb.date }} · {{ nb.sources }}</p>
              </div>
              <button aria-label="Optionen" style="display: inline-flex; flex-shrink: 0; align-items: center; justify-content: center; width: 30px; height: 30px; border: none; border-radius: 9999px; background: transparent; color: #a8a29b; cursor: pointer;" style-hover="background: #eceae4; color: #23211e;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
              </button>
            </div>
          </sc-for>
        </div>
      </sc-if>
      <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
        <p style="margin: 24px 0 0; font-size: 14px; color: #78736b;">Keine Notizbücher gefunden.</p>
      </sc-if>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { view: "grid", query: "" };
  notebooks = [
    { title: "Masterarbeit: Urbane Mobilität", date: "18. Juli 2026", sources: "4 Quellen", color: "#e8eaf6", emoji: "🚲" },
    { title: "Vereinsrecht & Satzung", date: "12. Juli 2026", sources: "2 Quellen", color: "#e6f4ea", emoji: "⚖️" },
    { title: "Produktrecherche Q3", date: "5. Juli 2026", sources: "11 Quellen", color: "#fef7e0", emoji: "🔍" },
    { title: "Podcast-Notizen", date: "28. Juni 2026", sources: "7 Quellen", color: "#fce8e6", emoji: "🎙️" },
    { title: "Steuererklärung 2025", date: "14. Juni 2026", sources: "3 Quellen", color: "#f3e8fd", emoji: "🧾" },
  ];
  renderVals() {
    const q = this.state.query.trim().toLowerCase();
    const filtered = q ? this.notebooks.filter(n => n.title.toLowerCase().includes(q)) : this.notebooks;
    return {
      query: this.state.query,
      onQueryChange: (e) => this.setState({ query: e.target.value }),
      noop: () => {},
      isGrid: this.state.view === "grid",
      isList: this.state.view === "list",
      gridBtnBg: this.state.view === "grid" ? "#f1efe9" : "transparent",
      listBtnBg: this.state.view === "list" ? "#f1efe9" : "transparent",
      setGridView: () => this.setState({ view: "grid" }),
      setListView: () => this.setState({ view: "list" }),
      filtered,
      noResults: filtered.length === 0,
    };
  }
}
</script>
</body>
</html>
